work_dir: ./work_dir/ntu60/fall25/balanced/joint

seed: 42
save_score: True
print_log: True

# model
model: model.LG-SGNet.Model
model_args:
  num_class: 2          # binary: 0=non-fall, 1=fall
  num_point: 25
  num_person: 1
  in_channels: 3
  drop_out: 0.5
  adaptive: True
  graph: graph.ntu_rgb_d.Graph
  graph_args:
    labeling_mode: 'spatial'

# feeder
feeder: feeders.feeder_ntu25_fall.Feeder
train_feeder_args:
  data_path: data/ntu25_data/balanced/joint/dataset.npz
  split: train
  debug: False
  window_size: 64
  random_rot: False
  p_interval: [0.5, 1.0]
  random_move: True # 3D rotation (yaw/pitch/roll)
  random_shift: True # random translation
  random_flip: True # horizontal flip + joint swap
  random_speed: True # temporal resampling
  random_noise: True
  normalization: False
  vel: False
  bone: False
  debug: False
  use_mmap: True

test_feeder_args:
  data_path: data/ntu25_data/balanced/joint/dataset.npz
  split: test
  window_size: 64
  p_interval: [1.0, 1.0]
  random_move: False
  random_shift: False
  random_flip: False
  random_speed: False
  random_noise: False
  normalization: False
  use_mmap: False
  vel: False
  bone: False
  debug: False
  use_mmap: True

#optim
optimizer: SGD
base_lr: 0.005
nesterov: True
weight_decay: 0.001
lr_decay_rate: 0.1
step: [10, 20]
warm_up_epoch: 3

loss_args: {}

# training
device: [0]
num_epoch: 80
batch_size: 32
test_batch_size: 32
num_worker: 0